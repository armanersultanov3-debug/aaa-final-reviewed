name: Docker Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: docker-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-integration:
    name: Docker-backed integration tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run Docker integration tests
        run: >
          uv run --locked pytest
          tests/integration_external
          tests/integration_local
          tests/integration_rule_coverage
          -q

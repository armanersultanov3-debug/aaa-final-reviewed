name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Fast checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Lint
        run: uv run --locked ruff check .

      - name: Compile sources
        run: uv run --locked python -m compileall -q src

      - name: Run fast tests
        run: >
          uv run --locked pytest tests
          --ignore=tests/integration_external
          --ignore=tests/integration_local
          --ignore=tests/integration_rule_coverage
          --ignore=tests/integration_real_world_cross_mode
          -q

      - name: Load rule catalog
        run: uv run --locked webconf-audit list-rules

      - name: Check docstring coverage
        run: uv run --locked interrogate -c pyproject.toml

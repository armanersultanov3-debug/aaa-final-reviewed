ServerRoot "."
Listen 80
PidFile "logs/httpd.pid"
ServerName docker-default.example.test
DocumentRoot "htdocs"

ErrorLog "logs/error_log"
LogFormat "%h %l %u %t \"%r\" %>s %b" common
CustomLog "logs/access_log" common

ServerTokens Full
ServerSignature On
TraceEnable Off

<Directory />
    AllowOverride None
    Require all denied
</Directory>

<Directory "htdocs">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

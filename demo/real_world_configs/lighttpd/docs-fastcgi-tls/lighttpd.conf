server.modules = ( "mod_accesslog", "mod_fastcgi", "mod_openssl", "mod_status" )

server.document-root = "www/app"
server.port = 8081
server.errorlog = "logs/app-error.log"
accesslog.filename = "logs/app-access.log"
index-file.names = ( "index.php", "index.html" )

fastcgi.server = (
    ".php" => ((
        "socket" => "/tmp/php-fpm.sock",
        "bin-path" => "/usr/bin/php-cgi"
    ))
)

$SERVER["socket"] == ":8443" {
    ssl.engine = "enable"
    ssl.pemfile = "certs/example.pem"
    ssl.cipher-list = "HIGH:!aNULL:!MD5"
    ssl.honor-cipher-order = "enable"
}

$HTTP["host"] == "status.example.test" {
    status.status-url = "/server-status"
}

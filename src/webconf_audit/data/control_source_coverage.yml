- source_id: cis-apache-http-server-2.4-2.3.0
  title: CIS Apache HTTP Server 2.4 Benchmark v2.3.0
  version: 2.3.0
  authority_url: https://www.cisecurity.org/benchmark/apache_http_server
  scope_note: Selected configuration-visible CIS Apache HTTP Server controls. Installation planning, service
    accounts, filesystem permissions, log storage and rotation, private-key metadata, SELinux, and AppArmor
    remain outside this scanner-evidence denominator.
  expected_summary:
    applicable: 20
    full: 19
    partial: 1
    policy_review: 0
    uncovered: 0
    excluded: 0
    full_percent: '95.0'
  denominator_notes:
  - change_id: apache-4.1-4.2-split
    delta_applicable: 1
    reason: Follow-up 11 split the historical Apache 4.1/4.2 grouped row into two counted items without
      automatically increasing the full numerator.
    change_ref: followup-11-apache-root-authorization-baseline
  items:
  - item_id: apache-2.1-module-minimization
    title: Module minimization
    references:
    - standard: CIS
      reference: Apache HTTP Server 2.4 v2.3.0 §2.1-§2.9
      grouped_references:
      - Apache HTTP Server 2.4 v2.3.0 §2.1
      - Apache HTTP Server 2.4 v2.3.0 §2.2
      - Apache HTTP Server 2.4 v2.3.0 §2.3
      - Apache HTTP Server 2.4 v2.3.0 §2.4
      - Apache HTTP Server 2.4 v2.3.0 §2.5
      - Apache HTTP Server 2.4 v2.3.0 §2.6
      - Apache HTTP Server 2.4 v2.3.0 §2.7
      - Apache HTTP Server 2.4 v2.3.0 §2.8
      - Apache HTTP Server 2.4 v2.3.0 §2.9
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - apache.modsecurity_module_missing
      assessment_controls:
      - control_id: apache.module_inventory
        strength: direct
        origin: declared
        absence_semantics: control-pass
        assessed_facets:
        - explicit-runtime-module-inventory
        - operator-module-policy
      registry_references:
      - rule_id: apache.modsecurity_module_missing
        standard: CIS
        reference: Apache HTTP Server 2.4 v2.3.0 §2.1-§2.9
        strength: partial
        origin: declared
      evidence_kinds:
      - local-config
      rationale: Config-visible `LoadModule` corroboration plus the supported `apache.module_inventory`
        snapshot-and-policy path now satisfy the grouped module-minimization subclaims without executing
        Apache.
      limitations:
      - Full status is limited to explicit complete module snapshots evaluated through `apache.module_inventory`.
      - Config-visible `LoadModule` evidence alone is not sufficient without the supported snapshot-plus-policy
        path.
    exclusion: null
    subclaims:
    - subclaim_id: apache-2.1-complete-module-inventory
      title: A complete runtime or build module inventory is evaluated against an explicit typed policy.
      mandatory: true
      implemented: true
      bindings:
      - kind: control
        target: apache.module_inventory
        strength: direct
        origin: declared
        absence_semantics: control-pass
      - kind: evidence-kind
        target: local-config
      limitations:
      - Concrete runs still require an explicit module snapshot and typed policy.
    - subclaim_id: apache-2.1-risky-module-corroboration
      title: Visible Apache configuration still corroborates risky-module presence for the grouped benchmark item.
      mandatory: true
      implemented: true
      bindings:
      - kind: rule
        target: apache.modsecurity_module_missing
        strength: partial
        origin: declared
      limitations: []
    provenance:
      reviewed_on: '2026-06-16'
      source_url: https://www.cisecurity.org/benchmark/apache_http_server
      change_ref: followup-14-final-cross-standard-reconciliation
  - item_id: apache-4.1-os-root-access-denied
    title: OS-root access denied by default
    references:
    - standard: CIS
      reference: Apache HTTP Server 2.4 v2.3.0 §4.1
      grouped_references: []
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - apache.os_root_access_not_denied
      registry_references:

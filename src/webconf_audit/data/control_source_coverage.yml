  - item_id: nginx-4.1.9-tls-session-cache-timeout
    title: TLS session cache and timeout
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §4.1.9 / §4.1.10
      grouped_references:
      - NGINX v3.0.0 §4.1.9
      - NGINX v3.0.0 §4.1.10
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - nginx.ssl_session_cache_missing
      - nginx.ssl_session_timeout_missing_or_invalid
      registry_references:
      - rule_id: nginx.ssl_session_cache_missing
        standard: CIS
        reference: NGINX v3.0.0 §4.1.9 / §4.1.10
        strength: direct
        origin: declared
      - rule_id: nginx.ssl_session_timeout_missing_or_invalid
        standard: CIS
        reference: NGINX v3.0.0 §4.1.9 / §4.1.10
        strength: direct
        origin: declared
      evidence_kinds:
      - local-config
      rationale: The rules validate session cache and timeout configuration in effective HTTP and server
        scopes.
      limitations: []
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-4.1.12-http3-alt-svc
    title: HTTP/3 and Alt-Svc posture
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §4.1.12
      grouped_references: []
    applicability: applicable
    status: policy-review
    evidence:
      rule_ids:
      - nginx.http3_alt_svc_review
      registry_references:
      - rule_id: nginx.http3_alt_svc_review
        standard: CIS
        reference: NGINX v3.0.0 §4.1.12
        strength: partial
        origin: declared
      evidence_kinds:
      - local-config
      - policy-review
      rationale: The opt-in rule reports the QUIC listener, effective http3 state, and effective Alt-Svc
        advertisement for operator review.
      limitations:
      - Runtime HTTP/3 negotiation is not proven.
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-5.1.1-sensitive-locations
    title: Sensitive locations
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §5.1.1
      grouped_references: []
    applicability: applicable
    status: partial
    evidence:
      rule_ids:
      - nginx.sensitive_location_missing_ip_filter
      registry_references:
      - rule_id: nginx.sensitive_location_missing_ip_filter
        standard: CIS
        reference: NGINX v3.0.0 §5.1.1
        strength: partial
        origin: declared
      evidence_kinds:
      - local-config
      rationale: The built-in rule detects sensitive location scopes that lack an IP restriction, and
        `nginx.sensitive_locations` can add operator-catalog route assessments without changing the
        counted source status.
      limitations:
      - A complete sensitive-path catalog is deployment-specific.
      - Policy-backed route assessments remain per-target evidence and do not promote this item beyond
        `partial`.
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx

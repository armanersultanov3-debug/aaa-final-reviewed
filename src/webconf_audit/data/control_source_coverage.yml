sources:
- source_id: cis-nginx-3.0.0
  title: CIS NGINX Benchmark v3.0.0
  version: 3.0.0
  authority_url: https://www.cisecurity.org/benchmark/nginx
  scope_note: Selected web-server-visible CIS NGINX controls. Package source, service-account, operating-system
    permission, approved-port, private-key permission, and mandatory-access-control requirements remain
    outside this scanner-evidence denominator.
  expected_summary:
    applicable: 15
    full: 8
    partial: 6
    policy_review: 1
    uncovered: 0
    excluded: 0
    full_percent: '53.3'
  items:
  - item_id: nginx-2.4.2-unknown-host-handling
    title: Unknown-host handling
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §2.4.2
      grouped_references: []
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - external.unknown_host_runtime_response
      - nginx.default_server_not_rejecting_unknown_hosts
      - nginx.default_tls_server_not_rejecting_unknown_hosts
      registry_references:
      - rule_id: external.unknown_host_runtime_response
        standard: CIS
        reference: NGINX v3.0.0 §2.4.2
        strength: partial
        origin: declared
      - rule_id: nginx.default_server_not_rejecting_unknown_hosts
        standard: CIS
        reference: NGINX v3.0.0 §2.4.2
        strength: direct
        origin: declared
      - rule_id: nginx.default_tls_server_not_rejecting_unknown_hosts
        standard: CIS
        reference: NGINX v3.0.0 §2.4.2
        strength: partial
        origin: declared
      evidence_kinds:
      - local-config
      - safe-probe
      rationale: Local default-server checks and a bounded runtime probe detect hosts that are not rejected.
      limitations: []
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-2.5.2-default-welcome-content
    title: Default welcome content
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §2.5.2
      grouped_references: []
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - external.nginx.default_index_page_body
      - external.nginx.default_welcome_page
      registry_references:
      - rule_id: external.nginx.default_index_page_body
        standard: CIS
        reference: NGINX v3.0.0 §2.5.2
        strength: partial
        origin: declared
      - rule_id: external.nginx.default_welcome_page
        standard: CIS
        reference: NGINX v3.0.0 §2.5.2
        strength: direct
        origin: declared
      evidence_kinds:
      - safe-probe
      rationale: Safe external probes identify the default Nginx welcome or index page.
      limitations: []
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-2.5.4-reverse-proxy-disclosure
    title: Reverse-proxy disclosure
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §2.5.4
      grouped_references: []
    applicability: applicable
    status: partial
    evidence:
      rule_ids:
      - nginx.proxy_set_header_host_spoofing
      registry_references:
      - rule_id: nginx.proxy_set_header_host_spoofing
        standard: CIS
        reference: NGINX v3.0.0 §2.5.4
        strength: partial
        origin: declared
      evidence_kinds:
      - local-config
      rationale: The rule detects an unsafe Host forwarding pattern in reverse-proxy configuration.
      limitations:
      - Complete reverse-proxy header semantics and application-generated disclosure are not modeled.
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-3.1-access-log-format
    title: Access log format
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §3.1
      grouped_references: []
    applicability: applicable
    status: partial
    evidence:
      rule_ids:
      - nginx.log_format_missing_fields
      registry_references:
      - rule_id: nginx.log_format_missing_fields
        standard: CIS
        reference: NGINX v3.0.0 §3.1
        strength: partial
        origin: declared
      evidence_kinds:
      - local-config
      rationale: Built-in findings validate significant audit fields in a named log format, and optional `nginx.logging` control assessments can compare effective destinations, escaping, and exact variables against an operator contract without changing the counted source status.
      limitations:
      - The final JSON, SIEM, and organization-specific log format remains an operator policy.
      - Static policy-backed assessments do not prove delivery, retention, clock synchronization, or application event completeness.
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-3.3-error-log-level
    title: Error log level
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §3.3
      grouped_references: []
    applicability: applicable
    status: partial
    evidence:
      rule_ids:
      - nginx.error_log_too_restrictive
      registry_references:
      - rule_id: nginx.error_log_too_restrictive
        standard: CIS
        reference: NGINX v3.0.0 §3.3
        strength: partial
        origin: declared
      evidence_kinds:
      - local-config
      rationale: Built-in findings detect an error log level that is too restrictive for useful security diagnostics, and optional `nginx.logging` control assessments can enforce explicit destination and threshold contracts without changing the counted source status.
      limitations:
      - The preferred warn, notice, or info level depends on operating policy and workload.
      - Static policy-backed assessments do not prove downstream alerting, retention, or successful log delivery.
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-3.4-forwarded-source-ip-headers
    title: Forwarded source-IP headers
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §3.4
      grouped_references: []
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - nginx.proxy_missing_source_ip_headers
      registry_references:
      - rule_id: nginx.proxy_missing_source_ip_headers
        standard: CIS
        reference: NGINX v3.0.0 §3.4
        strength: direct
        origin: declared
      evidence_kinds:
      - local-config
      rationale: The rule checks source-IP forwarding headers for proxy-like upstream directives.
      limitations: []
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-4.1.1-http-to-https-redirect
    title: HTTP to HTTPS redirect
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §4.1.1
      grouped_references: []
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - external.nginx.redirect_target_unexpected
      - nginx.missing_http_to_https_redirect
      registry_references:
      - rule_id: external.nginx.redirect_target_unexpected
        standard: CIS
        reference: NGINX v3.0.0 §4.1.1
        strength: partial
        origin: declared
      - rule_id: nginx.missing_http_to_https_redirect
        standard: CIS
        reference: NGINX v3.0.0 §4.1.1
        strength: direct
        origin: declared
      evidence_kinds:
      - local-config
      - safe-probe
      rationale: Local redirect analysis and runtime redirect probes identify cleartext listeners without
        an HTTPS transition.
      limitations: []
    exclusion: null
    provenance:
      reviewed_on: '2026-06-13'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-02-machine-readable-coverage-ledger
  - item_id: nginx-4.1.2-trusted-certificate-chain
    title: Trusted certificate chain
    references:
    - standard: CIS
      reference: NGINX v3.0.0 §4.1.2
      grouped_references: []
    applicability: applicable
    status: full
    evidence:
      rule_ids:
      - external.cert_chain_incomplete
      assessment_controls:
      - control_id: external.tls_inventory
        strength: direct
        origin: declared
        absence_semantics: control-pass
        assessed_facets:
        - inventory-completeness
        - certificate-chain
      registry_references:
      - rule_id: external.cert_chain_incomplete
        standard: CIS
        reference: NGINX v3.0.0 §4.1.2
        strength: partial
        origin: declared
      evidence_kinds:
      - safe-probe
      rationale: Bounded certificate-chain probing plus the declared `external.tls_inventory` control path
        cover every endpoint in an operator-declared complete TLS inventory without assuming undeclared
        listeners.
      limitations:
      - Full status is limited to operator-declared complete endpoint inventories evaluated through
        `external.tls_inventory`; local `ssl_certificate` paths alone are not sufficient.
    exclusion: null
    subclaims:
    - subclaim_id: nginx-4.1.2-declared-endpoint-inventory
      title: Declared endpoint inventory requires complete certificate-chain observation for every covered
        endpoint.
      mandatory: true
      implemented: true
      bindings:
      - kind: control
        target: external.tls_inventory
        strength: direct
        origin: declared
        absence_semantics: control-pass
      - kind: evidence-kind
        target: safe-probe
      limitations:
      - The supported scope is limited to declared complete endpoint inventories.
    - subclaim_id: nginx-4.1.2-chain-defect-detection
      title: Served certificate-chain defects are surfaced as findings for the declared inventory.
      mandatory: true
      implemented: true
      bindings:
      - kind: rule
        target: external.cert_chain_incomplete
        strength: partial
        origin: declared
      limitations: []
    provenance:
      reviewed_on: '2026-06-16'
      source_url: https://www.cisecurity.org/benchmark/nginx
      change_ref: followup-14-final-cross-standard-reconciliation
  - item_id: nginx-4.1.5-cipher-policy
    title: Cipher policy
    references:

worker_processes 1;
error_log /dev/null crit;
events {}
http {
    server_tokens on;
    merge_slashes off;
    log_format sparse '$remote_addr $request';
    ssl_protocols TLSv1 TLSv1.1;
    ssl_ciphers 'RC4:NULL:EXPORT:DES';
    ssl_prefer_server_ciphers off;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify off;
    ssl_conf_command Options UnsafeLegacyRenegotiation;
    ssl_conf_command Options Compression;
    client_body_timeout 600s;
    client_header_timeout 600s;
    keepalive_timeout 600s;
    send_timeout 600s;
    client_max_body_size 0;
    client_header_buffer_size 128k;
    large_client_header_buffers 2 128k;
    limit_req_zone $server_name zone=reqbad:10m rate=bogus;
    limit_conn_zone $server_name zone=connbad:10m;
    map $arg_target $backend { default $arg_target; }
    upstream app { server 127.0.0.1:8080; }

    server {
        listen 0.0.0.0:80 default_server;
        listen 0.0.0.0:80 default_server;
        autoindex on;
        auth_basic "Restricted";
        add_header X-Frame-Options ALLOWALL;
        add_header X-Content-Type-Options nope;
        add_header Referrer-Policy unsafe-url;
        add_header Permissions-Policy "geolocation=*";
        add_header Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval'";
        add_header X-Test $arg_header;
        return 302 http://$arg_next;
        location /alias { alias /var/www/private/; }
        location /classic/ { alias /var/www/private; }
        location /admin/ { proxy_pass http://app; }
        location /uploads/ { root /srv/www; }
        location ~ \.php$ { root /srv/www/uploads; fastcgi_pass unix:/run/php.sock; }
        location /if/ { if ($arg_x) { return 200 ok; } }
        location /proxy/ {
            proxy_pass http://$backend;
            proxy_set_header Host $http_host;
        }
        location /upstream-tls/ {
            proxy_ssl_verify off;
            proxy_pass https://backend.example;
        }
        limit_req zone=unknown burst=1;
        limit_conn connbad 0;
    }

    server {
        listen 0.0.0.0:443 ssl default_server;
        server_name _;
        ssl_certificate /etc/ssl/certs/example.pem;
        ssl_certificate_key /etc/ssl/private/example.key;
        return 200 ok;
    }

    server {
        listen 443 ssl;
        server_name *;
        ssl_certificate /etc/ssl/certs/example.pem;
        ssl_certificate_key /etc/ssl/private/example.key;
        proxy_pass http://app;
    }
}

events {}
http {
  server {
    listen 443 ssl;
    server_name first.example;
    ssl_certificate /cert.pem;
    add_header Strict-Transport-Security "max-age=100";
    return 200 ok;
  }
  server {
    listen 443 ssl;
    server_name second.example;
    ssl_certificate /cert.pem;
    ssl_certificate_key /key.pem;
    return 200 ok;
  }
  server {
    listen 80;
    server_name example.test;
    limit_req zone=nozone;
    limit_conn nozone 1;
  }
}

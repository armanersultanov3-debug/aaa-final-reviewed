events {}
http {
  log_format sparse '$remote_addr $request';
  access_log /var/log/nginx/access.log sparse;
  server {
    listen 80;
    server_name example.test;
    add_header Strict-Transport-Security "max-age=100";
    client_max_body_size 100g;
    location / {
      limit_except GET POST DELETE { allow all; }
    }
    location /private { allow all; deny all; }
    location /admin { return 200 ok; }
  }
}

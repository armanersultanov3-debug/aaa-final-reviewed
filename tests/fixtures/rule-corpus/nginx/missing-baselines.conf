events {}
http {
  server {
    listen 80;
    root /srv/www;
    location / { try_files $uri =404; }
  }
  server {
    listen 443 ssl default_server;
    server_name _;
    return 200 ok;
  }
  server {
    listen 443 ssl;
    server_name example.test;
    proxy_ssl_verify on;
    location / { proxy_pass https://backend.example; }
  }
}

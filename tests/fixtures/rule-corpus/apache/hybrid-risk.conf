ServerRoot "/etc/apache2"
Listen 80
ServerTokens Full
ServerSignature On
TraceEnable On
Timeout 600
KeepAlive Off
MaxKeepAliveRequests 5
KeepAliveTimeout 120
LimitRequestLine 20000
LimitRequestFieldSize 20000
FileETag INode MTime Size
LogLevel emerg
ErrorLog /dev/null
CustomLog logs/access.log combined
LogFormat "%h %r" combined
SSLCipherSuite RC4:NULL:EXPORT:DES
SSLProtocol all -TLSv1.3
SSLHonorCipherOrder Off
SSLCompression On
SSLInsecureRenegotiation On
SSLUseStapling Off
SSLSessionCache none
SSLProxyVerify none
SSLProxyCheckPeerName off
HttpProtocolOptions Unsafe
AllowEncodedSlashes On
MergeSlashes Off
Header set X-Frame-Options ALLOWALL
Header set Referrer-Policy unsafe-url
Header set Permissions-Policy "geolocation=*"
Header set Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval'"

<Directory "/">
    Options Indexes FollowSymLinks Includes ExecCGI MultiViews
    AllowOverride All
    Require all granted
</Directory>
<Directory "/var/www/html">
    Options Indexes ExecCGI Includes MultiViews
    AllowOverride All
</Directory>
<Location "/server-status">
    SetHandler server-status
    Require all granted
</Location>
<Location "/server-info">
    SetHandler server-info
    Require all granted
</Location>
<Location "/admin">
    AuthType Basic
    AuthName "admin"
    Require valid-user
</Location>

ProxyPreserveHost On
ProxyPass "/api" "https://backend.example/"
ProxyPass "/h2-api" "h2://backend.example/"

<VirtualHost *:80>
    ServerName _
    DocumentRoot "www"
    AuthType Basic
    AuthName "restricted"
</VirtualHost>
<VirtualHost *:443>
    ServerName _
    SSLEngine optional
    DocumentRoot "www"
</VirtualHost>
<VirtualHost *:443>
    ServerName *.example.test
    SSLEngine on
    DocumentRoot "www"
</VirtualHost>

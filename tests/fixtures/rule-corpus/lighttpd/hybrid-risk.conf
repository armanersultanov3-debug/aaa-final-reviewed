server.modules = ( "mod_access", "mod_alias", "mod_auth", "mod_cgi", "mod_status", "mod_webdav", "mod_setenv", "mod_accesslog" )
server.port = 80
server.bind = "0.0.0.0"
server.document-root = "/var/www/html"
server.tag = "lighttpd/1.4"
dir-listing.activate = "enable"
auth.require = ( "/admin" => ( "method" => "basic", "realm" => "admin", "require" => "valid-user" ) )
status.status-url = "/server-status"
cgi.assign = ( ".cgi" => "/usr/bin/perl" )
webdav.activate = "enable"
accesslog.filename = ""
accesslog.format = "%h %r"
server.max-request-size = 0
server.max-request-field-size = 999999
server.max-keep-alive-idle = 999
server.max-read-idle = 999
server.max-write-idle = 999
server.max-keep-alive-requests = 0
ssl.engine = "enable"
ssl.pemfile = ""
ssl.cipher-list = "RC4:NULL:EXPORT:DES"
ssl.honor-cipher-order = "disable"
ssl.use-sslv2 = "enable"
ssl.use-sslv3 = "enable"
ssl.openssl.ssl-conf-cmd = ( "Options" => "UnsafeLegacyRenegotiation,Compression" )
setenv.add-response-header = (
  "Strict-Transport-Security" => "max-age=100",
  "X-Frame-Options" => "ALLOWALL",
  "Referrer-Policy" => "unsafe-url",
  "Permissions-Policy" => "geolocation=*",
  "Content-Security-Policy" => "default-src * 'unsafe-inline' 'unsafe-eval'"
)
$SERVER["socket"] == ":443" {
  server.name = "example.test"
}

server {
    listen 80;
    listen [::]:80;
    server_name files.example.test www.files.example.test;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://files.example.test$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name files.example.test;
    ssl_certificate /etc/nginx/ssl/live/files.example.test/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/files.example.test/privkey.pem;
    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /images {
        alias /usr/share/nginx/files;
        autoindex on;
    }
}

events {
    worker_connections 1024;
}

http {
    log_format main "$remote_addr $host \"$request\" $status";

    upstream app_backend {
        server 127.0.0.1:8080;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /srv/www/public;

        access_log logs/detectify-access.log main;
        error_log logs/detectify-error.log warn;

        location /static/ {
            alias /srv/www/static;
        }

        location /assets {
            alias /srv/www/assets/;
        }

        location /api/ {
            proxy_pass http://app_backend/internal/;
        }

        location /admin {
            auth_basic "admin area";
        }
    }
}

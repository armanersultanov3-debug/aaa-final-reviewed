events {
    worker_connections 1024;
}

http {
    log_format proxy "$remote_addr $host \"$request\" $status";
    map $arg_role $mapped_backend {
        default internal_admin;
        admin metadata.internal;
    }

    upstream internal_admin {
        server 127.0.0.1:9000;
    }

    server {
        listen 80;
        root /srv/www/proxy;

        access_log logs/proxy-access.log proxy;
        error_log logs/proxy-error.log warn;
        set $dynamic_backend $arg_target;

        location / {
            proxy_pass http://internal_admin;
        }

        location /relay {
            proxy_pass http://$dynamic_backend;
        }

        location /mapped {
            proxy_pass http://$mapped_backend;
        }

        location /internal {
            proxy_pass http://$arg_target;
        }
    }
}

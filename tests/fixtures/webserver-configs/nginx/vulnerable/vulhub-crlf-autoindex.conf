events {
    worker_connections 1024;
}

http {
    log_format main "$remote_addr $host \"$request\" $status";

    server {
        listen 8080;
        server_name lab.example.test;
        root /srv/www/lab;
        server_tokens on;

        access_log logs/vulhub-access.log main;
        error_log logs/vulhub-error.log warn;

        location / {
            return 302 https://lab.example.test$request_uri;
        }

        location /files/ {
            autoindex on;
        }

        add_header X-Frame-Options SAMEORIGIN;
        add_header Set-Cookie "$arg_session; Secure" always;
    }
}

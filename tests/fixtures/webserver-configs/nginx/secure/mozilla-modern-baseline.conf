events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    log_format main "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent";

    server_tokens off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;

    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/ssl/example/fullchain.pem;
        ssl_certificate_key /etc/ssl/example/privkey.pem;
        ssl_reject_handshake on;
    }

    server {
        listen 443 ssl http2;
        server_name secure.example.test;

        ssl_certificate /etc/ssl/example/fullchain.pem;
        ssl_certificate_key /etc/ssl/example/privkey.pem;
        ssl_stapling on;
        ssl_stapling_verify on;

        access_log logs/secure-access.log main;
        error_log logs/secure-error.log notice;

        client_max_body_size 10m;
        client_body_timeout 10s;
        client_header_timeout 10s;
        keepalive_timeout 10s;
        send_timeout 10s;
        limit_req zone=perip burst=20 nodelay;
        limit_conn addr 20;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy geolocation=() always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            root /srv/www/secure;
            limit_except GET HEAD {
                deny all;
            }
        }

        location ~ /\. {
            deny all;
        }

        location ~ \.(bak|old|backup|orig|save)$ {
            deny all;
        }
    }
}

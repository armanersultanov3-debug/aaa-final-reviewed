server.tag = ""
server.bind = "127.0.0.1"
server.errorlog = "/var/log/lighttpd/error.log"
server.modules = ( "mod_accesslog", "mod_redirect" )
accesslog.filename = "/var/log/lighttpd/access.log"
server.max-connections = 1024
server.max-request-size = 1024
setenv.add-response-header = (
    "Content-Security-Policy" => "default-src 'self'; frame-ancestors 'self'; script-src 'self'; report-uri /csp",
    "X-Frame-Options" => "SAMEORIGIN",
    "X-Content-Type-Options" => "nosniff",
    "Referrer-Policy" => "strict-origin-when-cross-origin",
    "Permissions-Policy" => "geolocation=(), camera=()",
    "Strict-Transport-Security" => "max-age=31536000; includeSubDomains"
)
url.access-deny = ( ".inc", ".bak", ".old", ".backup", ".orig", ".save", ".swp", ".tmp", ".sql", ".conf", ".ini", ".log", ".env", ".DS_Store", "Thumbs.db", "composer.json", "composer.lock", "package-lock.json", ".npmrc", ".yarnrc", ".idea", ".vscode", ".git", ".svn" )

$SERVER["socket"] == ":80" {
    url.redirect = ( "^/(.*)$" => "https://example.test/$1" )
}

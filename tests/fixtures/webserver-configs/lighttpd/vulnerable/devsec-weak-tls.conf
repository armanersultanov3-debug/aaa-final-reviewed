server.document-root = "/srv/www/public"
server.bind = "0.0.0.0"
server.port = 443
server.tag = "lighttpd"
server.errorlog = "/var/log/lighttpd/error.log"
server.max-connections = 1024
server.max-request-size = 1024

server.modules = (
    "mod_accesslog",
    "mod_openssl"
)

accesslog.filename = "/var/log/lighttpd/access.log"

# Vulnerable: TLS engine enabled with a permissive cipher list, an explicit
# legacy renegotiation toggle, and no minimum protocol version pinning.
$SERVER["socket"] == "0.0.0.0:443" {
    ssl.engine = "enable"
    ssl.pemfile = "/etc/lighttpd/certs/example.pem"
    ssl.cipher-list = "ALL:!NULL:RC4-SHA:DES-CBC3-SHA"
    ssl.openssl.ssl-conf-cmd = ("Options" => "UnsafeLegacyRenegotiation,-ServerPreference")
    ssl.use-sslv2 = "disable"
}

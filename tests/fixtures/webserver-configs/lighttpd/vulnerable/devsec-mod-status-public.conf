server.document-root = "/srv/www/public"
server.bind = "0.0.0.0"
server.port = 80
server.tag = "lighttpd/1.4"
server.errorlog = "/var/log/lighttpd/error.log"

server.modules = (
    "mod_accesslog",
    "mod_status",
    "mod_dirlisting"
)

accesslog.filename = "/var/log/lighttpd/access.log"

# Vulnerable: mod_status exposed without url.access-deny restricting it.
status.status-url = "/server-status"
status.config-url = "/server-config"

# Vulnerable: directory listing left enabled globally.
dir-listing.activate = "enable"

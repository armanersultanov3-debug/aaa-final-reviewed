server.document-root = "/srv/www/public"
server.bind = "0.0.0.0"
server.port = 80
server.tag = "lighttpd"

server.modules = (
    "mod_auth",
    "mod_webdav"
)

# Vulnerable: no access log + no error log configuration.
# Vulnerable: Basic authentication served over plain HTTP.
auth.backend = "plain"
auth.backend.plain.userfile = "/etc/lighttpd/passwd"

$HTTP["url"] =~ "^/admin/" {
    auth.require = (
        "" => (
            "method"  => "basic",
            "realm"   => "admin",
            "require" => "valid-user",
        ),
    )
}

# Vulnerable: WebDAV write access enabled on a public path.
$HTTP["url"] =~ "^/upload/" {
    webdav.activate = "enable"
    webdav.is-readonly = "disable"
}

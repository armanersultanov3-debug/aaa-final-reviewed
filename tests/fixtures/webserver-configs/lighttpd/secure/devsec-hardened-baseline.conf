server.document-root = "/srv/www/public"
server.bind = "127.0.0.1"
server.port = 443
server.tag = ""
server.errorlog = "/var/log/lighttpd/error.log"
server.max-connections = 1024
server.max-request-size = 1024

server.modules = (
    "mod_accesslog",
    "mod_openssl",
    "mod_setenv"
)

accesslog.filename = "/var/log/lighttpd/access.log"
accesslog.format = "%h %V %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %{X-Request-Id}i %{X-Forwarded-For}i"

dir-listing.activate = "disable"

setenv.add-response-header = (
    "Content-Security-Policy" => "default-src 'self'; frame-ancestors 'self'; script-src 'self'; report-uri /csp",
    "X-Frame-Options" => "SAMEORIGIN",
    "X-Content-Type-Options" => "nosniff",
    "Referrer-Policy" => "strict-origin-when-cross-origin",
    "Permissions-Policy" => "geolocation=(), camera=(), microphone=()",
    "Strict-Transport-Security" => "max-age=31536000; includeSubDomains"
)

url.access-deny = (
    ".inc", ".bak", ".old", ".backup", ".orig", ".save", ".swp", ".tmp",
    ".sql", ".conf", ".ini", ".log", ".env", ".DS_Store", "Thumbs.db",
    "composer.json", "composer.lock", "package-lock.json", ".npmrc", ".yarnrc",
    ".idea", ".vscode", ".git", ".svn"
)

$HTTP["request-method"] !~ "^(GET|HEAD|POST)$" {
    url.access-deny = ("")
}

$SERVER["socket"] == "127.0.0.1:443" {
    ssl.engine = "enable"
    ssl.pemfile = "/etc/lighttpd/certs/example.pem"
    ssl.openssl.ssl-conf-cmd = (
        "MinProtocol" => "TLSv1.2",
        "CipherString" => "ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5",
        "ServerPreference" => "1"
    )
    ssl.honor-cipher-order = "enable"
}

ServerRoot "."
Listen 80
Listen 443
PidFile "logs/httpd.pid"
ServerName secure-apache.example.test
DocumentRoot "htdocs"

ServerTokens Prod
ServerSignature Off
TraceEnable Off
Timeout 10
KeepAlive On
KeepAliveTimeout 5
MaxKeepAliveRequests 100
LimitRequestBody 10485760
LimitRequestFields 100
LimitRequestFieldSize 8190
LimitRequestLine 8190
ErrorDocument 404 /errors/404.html
ErrorDocument 500 /errors/500.html
ErrorLog "logs/error_log"
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{User-Agent}i\" \"%{Referer}i\"" combined
CustomLog "logs/access_log" combined
FileETag MTime Size

Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
Header always set Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'"
Header always set X-Frame-Options "DENY"
Header always set X-Content-Type-Options "nosniff"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Permissions-Policy "geolocation=()"

SSLProtocol -all +TLSv1.2 +TLSv1.3
SSLCipherSuite HIGH:!aNULL:!MD5
SSLHonorCipherOrder On
SSLCompression Off
SSLSessionCache shmcb:logs/ssl_scache(512000)
SSLUseStapling On
SSLStaplingCache shmcb:logs/stapling_cache(128000)

<Directory />
    Options None
    AllowOverride None
    Require all denied
</Directory>

<Directory "htdocs">
    Options -Indexes FollowSymLinks
    AllowOverride None
    Require all granted
    <LimitExcept GET POST HEAD>
        Require all denied
    </LimitExcept>
</Directory>

<FilesMatch "\.(bak|old|swp|tmp)$">
    Require all denied
</FilesMatch>

<DirectoryMatch "/\.(git|svn)">
    Require all denied
</DirectoryMatch>

<VirtualHost *:80>
    ServerName secure-apache.example.test
    Redirect permanent / https://secure-apache.example.test/
</VirtualHost>

<VirtualHost *:443>
    ServerName secure-apache.example.test
    DocumentRoot "htdocs"
    SSLEngine on
    SSLCertificateFile "/etc/ssl/example/fullchain.pem"
    SSLCertificateKeyFile "/etc/ssl/example/privkey.pem"
</VirtualHost>

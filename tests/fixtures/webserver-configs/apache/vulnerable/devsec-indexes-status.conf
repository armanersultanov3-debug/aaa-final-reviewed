ServerRoot "."
Listen 80
PidFile "logs/httpd.pid"
ServerName apache-lab.example.test
DocumentRoot "htdocs"

ServerTokens Full
ServerSignature On
TraceEnable On
ErrorLog "logs/error_log"
LogFormat "%h %l %u %t \"%r\" %>s %b" common
CustomLog "logs/access_log" common

<Directory />
    AllowOverride All
    Require all granted
</Directory>

<Directory "htdocs">
    Options Indexes Includes ExecCGI FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Location "/server-status">
    SetHandler server-status
    Require all granted
</Location>

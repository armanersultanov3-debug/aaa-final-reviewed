ServerRoot "."
Listen 80
PidFile "logs/httpd.pid"
ServerName htaccess-lab.example.test
DocumentRoot "www/app"

ServerTokens Prod
ServerSignature Off
TraceEnable Off
ErrorLog "logs/error_log"
LogFormat "%h %l %u %t \"%r\" %>s %b" common
CustomLog "logs/access_log" common

<Directory />
    AllowOverride None
    Require all denied
</Directory>

<Directory "www/app">
    Options -Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

ServerRoot "."
Listen 443
PidFile "logs/httpd.pid"
ServerName weak-tls.example.test
DocumentRoot "htdocs"

ErrorLog "logs/error_log"
LogFormat "%h %l %u %t \"%r\" %>s %b" common
CustomLog "logs/access_log" common
ServerTokens Prod
ServerSignature Off
TraceEnable Off

<Directory />
    AllowOverride None
    Require all denied
</Directory>

<Directory "htdocs">
    Options -Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

<VirtualHost *:443>
    ServerName weak-tls.example.test
    DocumentRoot "htdocs"
    SSLEngine on
    SSLProtocol all
    SSLCipherSuite ALL:!aNULL
    SSLCompression On
    SSLInsecureRenegotiation On
    SSLHonorCipherOrder Off
</VirtualHost>

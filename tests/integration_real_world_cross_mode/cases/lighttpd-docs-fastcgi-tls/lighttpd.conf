server.modules = ( "mod_accesslog", "mod_indexfile", "mod_openssl", "mod_status" )

server.document-root = "/opt/lighttpd/www/app"
server.port = 8081
server.errorlog = "/opt/lighttpd/logs/app-error.log"
accesslog.filename = "/opt/lighttpd/logs/app-access.log"
index-file.names = ( "index.html" )

$SERVER["socket"] == ":8443" {
    ssl.engine = "enable"
    ssl.pemfile = "/opt/lighttpd/certs/example.pem"
    ssl.cipher-list = "HIGH:!aNULL:!MD5"
    ssl.honor-cipher-order = "enable"
}

$HTTP["host"] == "status.example.test" {
    status.status-url = "/server-status"
}

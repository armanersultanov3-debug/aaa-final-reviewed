# Mozilla SSL Configuration Generator: nginx, modern profile.
# Source: https://ssl-config.mozilla.org/#server=nginx&config=modern
#
# Modern compatibility: services that only need to support clients on Firefox
# 63+, Chrome 70+, IE 11/Edge 17+ (Win10), Safari 12.1+, Opera 57+, Android 10+,
# Java 11+, OpenSSL 1.1.1+. Allows only TLS 1.3.

server {
    listen 443 ssl http2;
    server_name modern.example.test;

    ssl_certificate /etc/ssl/mozilla/fullchain.pem;
    ssl_certificate_key /etc/ssl/mozilla/privkey.pem;

    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozModern:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        root html;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root html;
    index index.html index.htm;

    access_log logs/default-access.log main;
    error_log logs/default-error.log warn;

    location / {
        try_files $uri $uri/ =404;
    }

    location /static/ {
        autoindex off;
    }
}

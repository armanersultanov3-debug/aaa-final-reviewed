# Mozilla SSL Configuration Generator: nginx, intermediate profile.
# Source: https://ssl-config.mozilla.org/#server=nginx&config=intermediate
#
# Intermediate compatibility: services that support the widest variety of
# clients without including legacy unsafe protocols. Allows TLS 1.2 + 1.3 and
# uses Mozilla's intermediate cipher suite.

server {
    listen 443 ssl http2;
    server_name intermediate.example.test;

    ssl_certificate /etc/ssl/mozilla/fullchain.pem;
    ssl_certificate_key /etc/ssl/mozilla/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozIntermediate:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    location / {
        root html;
    }
}

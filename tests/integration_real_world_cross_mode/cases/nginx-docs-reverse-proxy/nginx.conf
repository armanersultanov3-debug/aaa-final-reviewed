worker_processes 1;

events {
    worker_connections 1024;
}

http {
    log_format proxy "$remote_addr $host \"$request\" $status $body_bytes_sent";
    access_log logs/proxy-access.log proxy;
    error_log logs/proxy-error.log warn;

    upstream app_backend {
        server 127.0.0.1:8081;
        keepalive 16;
    }

    include conf.d/*.conf;
}

server.modules = ( "mod_accesslog", "mod_indexfile", "mod_dirlisting" )

var.log_root = "/opt/lighttpd/logs"
var.server_root = "/opt/lighttpd/www"

server.document-root = var.server_root + "/htdocs"
server.port = 8080
server.errorlog = var.log_root + "/error.log"
accesslog.filename = var.log_root + "/access.log"
index-file.names = ( "index.html" )

include "conf.d/*.conf"
